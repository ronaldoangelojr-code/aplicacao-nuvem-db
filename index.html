<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Contatos</title>
</head>
<body>
    <h1>Gerenciamento de Contatos</h1>
    <div>
        <h2>Buscar contato</h2>
        <label for="busca-nome">Nome:</label>
        <input 
            id="buscar-nome"
            onkeyup="buscarContato()"
        >
        <button onclick="buscarContato()">Buscar</button>
    </div>
    <div>
        <h2>Novo Contato</h2>
        <form id="form-contato">
            
            <label>
                Nome:
                <input type="text" id="nome" required>
            </label>
            
            <label>
                E-mail:
                <input type="email" id="email" required>
            </label>

            <label>
                Telefone:
                <input type="text" id="telefone" required>
            </label>

            <label>
                Observação:
                <textarea type="text" id="obs"></textarea>
            </label>
            
            <button type="submit">Salvar</button>
            <button type="submit">Cancelar</button>
        
        </form>    
    </div>
    <div>
        <table>

            <thead>

                <tr>
                    <th>Id</th>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>E-mail</th>
                    <th>Observação</th>
                    <th>Data</th>
                    <th class="acoes"></th>
                    <th class="acoes"></th>
                </tr>

            </thead>
            <tbody id="tabela-contato">

            </tbody>
        </table>
        <!-- Biblioteca do Supabase -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="script.js"></script>
    </div>   
</body>
</html>
