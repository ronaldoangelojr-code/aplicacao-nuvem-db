<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Contatos</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div>    
        <h1>Gerenciamento de Contatos</h1>
        <h2>Buscar contato</h2>
        <label for="busca-nome">Nome:</label>
        <input 
            type="text"
            id="buscar-nome"
            placeholder="Digite o nome para buscar"
        >
        <button onclick="buscarContato()">Buscar</button>
        <button 
            type="button" 
            onclick="limparBusca()">
            Limpar
        </button>
    </div>
    <div>
        <h2>Novo Contato</h2>
        <form id="form-contato">
            
            <label>
                Nome:
                <input type="text" id="nome" placeholder="Nome completo" required>
            </label>
            
            <label>
                E-mail:
                <input type="email" id="email" placeholder="exemplo@email.com" required>
            </label>

            <label>
                Telefone:
                <input type="text" id="telefone" placeholder="(xx) xxxxx-xxxx" required>
            </label>

            <label>
                Observação:
                <textarea id="obs" placeholder="Área de texto reservada a observações."></textarea>
            </label>
            
            <button type="submit">Salvar</button>
            <button type="button" onclick="cancelarEdicao()">Cancelar</button>
        
        </form>    
    </div>
    <div>
        <table>

            <thead>

                <tr>
                    <th>Id</th>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>E-mail</th>
                    <th>Observação</th>
                    <th>Data</th>
                    <th class="acoes"></th>
                    <th class="acoes"></th>
                </tr>

            </thead>
            <tbody id="tabela-contato">

            </tbody>
        </table>
        <!-- Biblioteca do Supabase -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="script.js"></script>
    </div>   
</body>
</html>
