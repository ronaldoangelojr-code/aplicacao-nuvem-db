<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Contatos</title>
</head>
<body>
    <h1>Gerenciamento de Contatos</h1>
    <div>
        <h2>Busca</h2>
        <label for="busca-nome">Nome</label>
        <input type="text" name="busca-nome" placeholder="Digite o nome para busca">
        <button type="submit">Buscar</button>
    </div>
    <div>
        <h2>Novo Contato</h2>
        <label for="novo-nome">Nome</label>
        <input type="text" name="novo-nome">
        <label for="novo-telefone">Telefone</label>
        <input type="text" name="novo-telefone">
        <label for="novo-email">E-mail</label>
        <input type="text" name="novo-email">
        <button type="submit">Salvar</button>
        <button type="submit">Cancelar</button>
    </div>
    <div>
        <table>

        <thead>

            <tr>
                <th>Id</th>
                <th>Nome</th>
                <th>Telefone</th>
                <th>E-mail</th>
                <th>Aniversário</th>
                <th class="acoes"></th>
                <th class="acoes"></th>
            </tr>

        </thead>
        </table>
    </div>
</body>
</html>
